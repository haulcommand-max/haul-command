        reason: "Aggregation stage"
      - name: "geocode-worker"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Geocoding is a shared utility"
      - name: "here-geocode"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "HERE-specific adapter for geocode-worker"
      - name: "here-polyline"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "HERE-specific adapter for polyline-worker"
      - name: "polyline-worker"
