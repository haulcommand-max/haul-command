name: Lighthouse CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Wait for Vercel preview deployment before running Lighthouse
      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.3
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
        continue-on-error: true  # Don't block on push to main (no preview URL)

      # Run against Vercel preview URL on PRs, production on main push
      - name: Determine target URL
        id: url
        run: |
          if [ -n "${{ steps.vercel.outputs.url }}" ]; then
            echo "TARGET=${{ steps.vercel.outputs.url }}" >> $GITHUB_OUTPUT
          else
            echo "TARGET=https://www.haulcommand.com" >> $GITHUB_OUTPUT
          fi

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.url.outputs.TARGET }}
            ${{ steps.url.outputs.TARGET }}/training
            ${{ steps.url.outputs.TARGET }}/directory
            ${{ steps.url.outputs.TARGET }}/loads
          temporaryPublicStorage: true
          budgetPath: ./lighthouse-budget.json
          runs: 3
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
