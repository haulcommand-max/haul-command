# ============================================================
# ci.yml — Full CI Safety Shell
# Runs on: PR → main and push to any non-main branch
# Required checks: lint, typecheck, build, unit-tests, smoke
# ============================================================
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── FAST CHECKS (parallel) ─────────────────────────────────
  lint:
    name: "CI / Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: "CI / Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  unit-tests:
    name: "CI / Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test --if-present
        env:
          CI: true
      - name: Upload unit test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: coverage/
          retention-days: 7

  migration-safety:
    name: "CI / Migration Safety"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect risky SQL patterns
        run: |
          set -e
          if ls supabase/migrations/*.sql > /dev/null 2>&1; then
            echo "Found Supabase migrations. Running safety checks..."
            if grep -RIn "DROP TABLE" supabase/migrations; then
              echo "❌ DROP TABLE detected in migrations. Blocked."
              exit 1
            fi
            if grep -RIn "CREATE POLICY IF NOT EXISTS" supabase/migrations; then
              echo "❌ CREATE POLICY IF NOT EXISTS detected (invalid in Postgres)."
              exit 1
            fi
            echo "✅ Migration safety checks passed."
          else
            echo "No migrations found. Skipping."
          fi

  # ── BUILD CHECK (depends on fast checks) ───────────────────
  build:
    name: "CI / Build"
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Mapbox / analytics keys required for build
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          # Prevent source-map upload during PR builds (save quota)
          SENTRY_UPLOAD_SOURCEMAPS: 'false'
      - name: Upload build artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: .next/
          retention-days: 3

  # ── PLAYWRIGHT SMOKE TESTS (requires build to pass) ─────────
  smoke:
    name: "CI / Smoke Tests (localhost)"
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Build for smoke test
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_UPLOAD_SOURCEMAPS: 'false'
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
      - name: Run critical route smoke tests
        run: npx playwright test tests/e2e/smoke-critical-routes.spec.ts --reporter=html
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: playwright-report/
          retention-days: 14
