app = 'hc-transformers-engine'
primary_region = 'atl'

[build]
  dockerfile = "Dockerfile"

[compute]
  size = "performance-1x"

[env]
  MODEL_NAME = "sentence-transformers/all-MiniLM-L6-v2"
  TASK = "feature-extraction"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
