name: Health Probe

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours (saves Actions minutes)
  workflow_dispatch:

env:
  PROD_BASE_URL: "https://haulcommand.com"
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  probe:
    name: Production Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts/ops
          sparse-checkout-cone-mode: false
      - name: Probe Health Endpoint
        run: node scripts/ops/health_probe.mjs
