name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_qa:
    name: Build & Run QA Enforcement
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Compile Check
        run: npx tsc --noEmit

      - name: Next.js Production Build
        run: npm run build
        
      - name: Start Production Server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for localhost:3000
        run: npx wait-on tcp:3000

      - name: Execute QA Pipeline
        run: npm run qa
