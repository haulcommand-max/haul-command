haul_command_global_keyword_os:
  version: "2026-04-01"
  objective: "Build a 120-country heavy-haul, escort, directory, regulations, tools, glossary, and branded-search SEO operating system for Haul Command."
  answer_to_should_we_do_more_than_25: "Yes. Use 25 commercial keyword families plus 20 authority/support families. Then expand them by country, region, city, corridor, and branded variants."
  honesty_guardrail:
    exact_volume_note: "This is intent-first and market-language-first. It is not exact Ads/Ahrefs/Semrush volume data."
    validation_rule: "Tier A and Tier B can be built aggressively now. Tier C-E should be SERP-validated by Gemini before mass page generation if local-language confidence is medium or low."

  build_order:
    - "Tier A commercial pages"
    - "Tier A directory pages"
    - "Tier A regulations pages"
    - "Tier A tools pages"
    - "Tier A glossary pages"
    - "Tier A region/state/province pages"
    - "Tier A top-city pages"
    - "Tier B using same system"
    - "Tier C-E after SERP validation and template localization"

  page_families:
    commercial_core_25:
      - "escort service"
      - "escort service near me"
      - "escort company"
      - "escort companies"
      - "pilot car service"
      - "pilot car near me"
      - "pilot car directory"
      - "pilot car directory near me"
      - "pilot car directory service near me"
      - "best pilot car directory near me"
      - "oversize load escort"
      - "wide load escort"
      - "escort vehicle service"
      - "lead escort vehicle"
      - "rear escort vehicle"
      - "chase car service"
      - "high pole escort"
      - "route survey service"
      - "route planning for oversize loads"
      - "permit and escort service"
      - "certified escort service"
      - "insured escort service"
      - "24/7 escort service"
      - "urgent / emergency escort service"
      - "superload escort service"

    authority_support_20:
      - "regulations"
      - "permit rules"
      - "escort vehicle laws"
      - "state / province escort requirements"
      - "city escort restrictions"
      - "route survey tool"
      - "permit checker tool"
      - "height / clearance checker"
      - "route risk checker"
      - "load banner / light rules"
      - "glossary"
      - "definitions"
      - "cost / pricing"
      - "equipment checklist"
      - "training"
      - "jobs"
      - "compare pages"
      - "corridor pages"
      - "industry statistics / state of market pages"
      - "directory by city / state / country"

    future_bets_low_priority:
      - "pilot cars for autonomous vehicles"
      - "autonomous escort vehicle"
      - "AI escort vehicle systems"
      - "digital route escort"
      - "autonomous convoy safety vehicle"

  branded_query_system:
    required_brand: "Haul Command"
    branded_patterns:
      - "Haul Command [root] directory"
      - "Haul Command [root] directory near me"
      - "Haul Command [root] service near me"
      - "Haul Command [country] [root] directory"
      - "Haul Command [city] [root]"
      - "Haul Command [root] regulations"
      - "Haul Command [root] tools"
      - "Haul Command [root] glossary"
      - "Haul Command heavy haul directory"
      - "Haul Command oversize escort directory"

  keyword_pattern_engine:
    commercial_patterns:
      - "[root]"
      - "[root] near me"
      - "[root] in [country]"
      - "[root] in [region]"
      - "[root] in [city]"
      - "[root] company"
      - "[root] companies"
      - "best [root] near me"
      - "[specialty_term]"
      - "[specialty_term] near me"
      - "[city] [specialty_term]"
      - "[country] [specialty_term]"
    directory_patterns:
      - "[root] directory"
      - "[root] directory near me"
      - "best [root] directory near me"
      - "[country] [root] directory"
      - "[region] [root] directory"
      - "[city] [root] directory"
      - "Haul Command [root] directory"
      - "Haul Command [country] [root] directory"
    regulations_patterns:
      - "[country] [legal_root] regulations"
      - "[country] [legal_root] permit rules"
      - "[country] escort vehicle laws"
      - "[region] escort requirements"
      - "[country] oversize permit rules"
      - "[country] wide load rules"
      - "[country] route survey requirements"
    tools_patterns:
      - "[country] route survey tool"
      - "[country] permit checker"
      - "[country] height clearance checker"
      - "[country] bridge / route restriction tool"
      - "[country] escort requirement checker"
      - "[country] heavy haul route planner"
    glossary_patterns:
      - "what is [root]"
      - "what is [specialty_term]"
      - "[country] heavy haul glossary"
      - "[country] escort terms"
      - "[country] pilot car terms"
      - "[country] oversize load definitions"
    semantic_patterns:
      - "[root] for wind turbine transport"
      - "[root] for transformer transport"
      - "[root] for crane transport"
      - "[root] for modular home transport"
      - "[root] for construction equipment transport"
      - "[root] for bridge beam transport"
      - "[root] insurance"
      - "[root] cost"
      - "[root] checklist"
      - "[root] map"

  interlinking_os:
    rule: "No dead ends. Every page must link up, down, and sideways."
    mandatory_paths:
      - "country hub -> regulations hub"
      - "country hub -> directory hub"
      - "country hub -> tool hub"
      - "country hub -> glossary hub"
      - "country hub -> top region pages"
      - "region page -> city pages"
      - "city page -> service pages"
      - "service page -> directory page"
      - "service page -> regulations page"
      - "service page -> tools page"
      - "service page -> glossary definitions"
      - "glossary term page -> service pages using that term"
      - "tool page -> regulations page that explains the rule"
      - "directory page -> city page -> country page"
      - "corridor page -> city pages -> regulations -> directory"
    anchor_text_rules:
      - "Use exact service anchors where natural."
      - "Use local root term anchors, not generic 'click here'."
      - "Cross-link synonyms: pilot car / escort vehicle / oversize escort / abnormal load escort / OSOM escort."
      - "Cross-link branded anchors: Haul Command pilot car directory, Haul Command escort directory."
    crawl_depth_target:
      money_pages_within_clicks_from_home: 3
      country_hubs_within_clicks_from_home: 2
      top_city_pages_within_clicks_from_home: 3

  metadata_os:
    title_pattern: "[Primary Root Term] in [Geo] | Directory, Rules, Tools | Haul Command"
    meta_pattern: "Find [primary root term] in [geo]. Compare providers, check rules, use tools, and view glossary terms on Haul Command."
    h1_pattern: "[Primary Root Term] in [Geo]"
    breadcrumb_pattern:
      - "Home"
      - "[Country]"
      - "[Region]"
      - "[City]"
      - "[Page Type]"
    url_pattern_rules:
      - "Use audience language in slug when market supports local-language URLs."
      - "Use hyphens."
      - "Keep slugs short and descriptive."
      - "One canonical slug per page."
    do_not_waste_time_on:
      - "sitelinks search box markup"
      - "FAQ rich-result chasing for normal commercial pages"

  image_os:
    principle: "Images should reinforce local service intent, trust, and usefulness."
    required_asset_types:
      - "escort vehicles in-market"
      - "state / country regulation maps"
      - "permit flow diagrams"
      - "route survey examples"
      - "high pole escort setups"
      - "equipment checklists"
      - "corridor graphics"
      - "directory trust badges"
      - "claim your listing graphics"
      - "comparison charts"
    filename_pattern: "[country-code]-[city-slug]-[root-slug]-[subject].webp"
    alt_text_pattern: "[Accurate plain-English or local-language description of the image using the page’s root term only if true]"
    caption_pattern: "[Geo] [root] example, rules, equipment, or route context"
    surrounding_copy_rule: "Place image near matching text block and section heading."
    structured_data_rule: "Reference image consistently and include page-appropriate schema."
    anti_spam_rule: "Do not stuff keywords into alt text or captions. Accuracy first."

  schema_os:
    sitewide:
      - "Organization"
      - "WebSite"
      - "BreadcrumbList"
    page_type_specific:
      directory_page:
        - "CollectionPage"
        - "ItemList"
        - "LocalBusiness when page is about Haul Command’s local operation, not random third parties"
      service_page:
        - "Service"
        - "BreadcrumbList"
      article_page:
        - "Article"
        - "ImageObject"
        - "BreadcrumbList"
      product_or_tool_page:
        - "Product where actually applicable"
        - "SoftwareApplication if true"
        - "BreadcrumbList"
    caution:
      - "Do not build an FAQ-rich-result strategy for normal commercial pages."

  gemini_execution_rules:
    - "Generate country hubs first, then region/state pages, then city pages, then service pages, then regulations/tools/glossary support pages."
    - "Never translate blindly. Check live SERPs for root-term fit before mass publishing lower-confidence markets."
    - "Prefer local legal term + local commercial term + English fallback where English-heavy logistics SERPs dominate."
    - "Every page must receive at least 5 internal links at launch."
    - "Every country hub must link to directory, regulations, tools, glossary, top cities, and top specialties."
    - "Every local page must include nearby geos, adjacent services, glossary terms, and regulation links."
    - "Use people-first, useful content. No thin doorway garbage."
    - "Publish with stable canonical URLs, indexable HTML, and crawlable anchor links."

