name: "Haul Command SEO + Conversion + Monopoly Page-System Build Spec"
version: "2026-04-09"
mode: "upgrade_only"
host_posture: "small_now_medium_later"
mission:
  primary: "Make Haul Command the default operating system and authority layer for heavy haul discovery, trust, claiming, booking, routing, regulations, tools, and market intelligence."
  acceptance_standard: "competitor_made_obsolete"
  day_one_rule: "Every important page family ships with crawlable discovery, trust, monetization, and a next move."
  no_dead_end_rule: true
  truth_first_rule: true

global_rules:
  page_system_laws:
    - "Every page must have one dominant action."
    - "Every page must have a clear parent path."
    - "Every page must have sibling and related links."
    - "Every page must expose at least one commercial next step."
    - "Every important page must be reachable through HTML links."
    - "Every answer page must expose quick answer + expanded answer + freshness + confidence + next step."
    - "Every local page must expose local proof, local relevance, and local commercial action."
    - "Every page family must reinforce at least 3 other page families."
    - "Informational pages feed commercial pages."
    - "Commercial pages link back to authority pages."
    - "No page may exist as an island."
    - "If live data is weak, show truthful fallback utility instead of fake activity."

  universal_page_shell:
    required_blocks:
      - id: "hero_intent_header"
        purpose: "Name the page clearly and route the user immediately."
        required_fields:
          - "h1"
          - "subhead"
          - "who_this_is_for"
          - "primary_intent_label"
          - "location_context_if_relevant"
          - "one_primary_cta"
          - "one_secondary_cta"
      - id: "quick_answer_block"
        purpose: "Machine-readable answer surface for AI-search and snippets."
        required_fields:
          - "direct_answer"
          - "expanded_explanation"
          - "freshness_state"
          - "confidence_state"
          - "source_path_label"
          - "next_step_cta"
      - id: "trust_strip"
        purpose: "Show proof before ask."
        required_fields:
          - "verification_state"
          - "freshness_signal"
          - "response_or_activity_signal_if_truthful"
          - "trust_score_or_proof_proxy_if_truthful"
      - id: "commercial_next_moves"
        purpose: "Make money and action obvious."
        required_fields:
          - "primary_conversion_cta"
          - "secondary_conversion_cta"
          - "claim_cta_if_claimable"
          - "app_install_or_login_cta_if_operational"
      - id: "related_link_cluster"
        purpose: "Prevent islands and strengthen clusters."
        required_fields:
          - "parent_links"
          - "sibling_links"
          - "related_pages"
          - "commercial_support_links"
      - id: "faq_or_decision_block"
        purpose: "Handle objections and long-tail intent."
        required_fields:
          - "decision_questions_only"
          - "no_filler_faq_spam"
      - id: "footer_cluster_rail"
        purpose: "Deep crawl reinforcement."
        required_fields:
          - "browse_by_state_or_region_if_relevant"
          - "browse_by_city_if_relevant"
          - "browse_by_role_if_relevant"
          - "browse_by_tool_or_regulation_if_relevant"

  universal_cta_catalog:
    primary_ctas:
      - "Find available operators"
      - "Request escort support"
      - "Claim this listing"
      - "Use the tool"
      - "Check requirements"
      - "See rates"
      - "View nearby markets"
      - "Install the app"
      - "Book route support"
      - "Post a load"
      - "Get urgent replacement"
      - "Become a sponsor"
      - "Unlock data"
    secondary_ctas:
      - "Compare providers"
      - "See trusted results"
      - "View report card"
      - "Save this market"
      - "Follow this corridor"
      - "View related glossary terms"
      - "View official source path"
      - "Download forms"
      - "Start training"
      - "Get listed"
      - "Join waitlist"
      - "Apply as partner"

  universal_internal_link_rules:
    minimums:
      parent_links: 1
      sibling_links: 3
      related_links: 6
      commercial_links: 2
    hard_rules:
      - "At least one inbound link from a stronger informational page to every commercial page."
      - "At least one outbound link from every informational page to a commercial next step."
      - "Every local page must link to nearby local pages."
      - "Every glossary page must link to at least one regulation page, one tool page, and one service/profile page."
      - "Every regulation page must link to glossary, tool, service, and location pages."
      - "Every profile page must link to market pages, rules/tools, and booking/claim flows."
      - "Every corridor page must link to nearby cities, related rates, related services, and related restrictions."
      - "Every tool page must link to the problem it solves, the rule it supports, and the service/provider that can act on the result."

  event_contracts:
    required_events:
      - "page_viewed"
      - "answer_block_seen"
      - "cta_clicked"
      - "claim_cta_clicked"
      - "sponsor_cta_clicked"
      - "related_link_clicked"
      - "tool_started"
      - "tool_completed"
      - "regulation_source_clicked"
      - "profile_contact_attempted"
      - "available_now_viewed"
      - "load_post_started"
      - "app_install_cta_clicked"
    high_value_events:
      - "claim_started"
      - "claim_completed"
      - "request_submitted"
      - "load_post_submitted"
      - "quote_requested"
      - "push_opt_in_completed"
      - "market_followed"
      - "corridor_followed"

  sponsor_logic:
    sponsor_surfaces:
      - "country"
      - "state_or_region"
      - "city"
      - "corridor"
      - "tool"
      - "glossary"
      - "regulation"
      - "leaderboard"
      - "available_now"
      - "claim_surface"
      - "data_product"
    display_rules:
      - "Sponsor units must look native and premium."
      - "Thin markets still get sponsor inventory."
      - "Sponsor slots should map to actual intent."
      - "Claim-related pages should include sponsor or upgrade logic when contextually relevant."
      - "No sponsor block can push core user utility below the fold."

  fallback_rules:
    if_no_live_supply:
      - "Show waitlist CTA"
      - "Show request support CTA"
      - "Show claim CTA"
      - "Show nearby markets"
      - "Show route/rate/regulation utility"
    if_no_reviews_or_trust_data:
      - "Show verification status"
      - "Show profile freshness"
      - "Show completion state"
      - "Show report-card-coming-soon only if workflow exists"
    if_no_market_data:
      - "Show foundational facts, nearby markets, and next best action"
    if_feature_not_live:
      - "Label truthfully"
      - "Route to closest useful alternative"
      - "Do not render dead CTA"

