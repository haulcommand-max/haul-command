  lead_scoring:
    formula: >
      (industry_weight × 0.30) +
      (urgency_signals × 0.25) +
      (load_size_indicator × 0.20) +
      (repeat_volume × 0.15) +
      (payment_behavior × 0.10)

    industry_weights:
      wind_energy: 95
      transformers_power: 93
      project_freight_forwarders: 92
      heavy_haul_carriers: 90
      crane_rental_fleets: 85
      modular_housing: 72
      agriculture: 60

    urgency_keywords:
