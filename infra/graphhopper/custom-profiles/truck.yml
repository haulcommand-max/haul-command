# Standard Truck Profile
# For legal-weight trucks (no oversize permit required)

priority:
  - if: max_height < 4.1  # ~13.5ft (standard clearance)
    multiply_by: 0
  - if: max_weight < 36   # ~80K lbs
    multiply_by: 0
  - if: hgv == NO
    multiply_by: 0
  - if: road_class == LIVING_STREET
    multiply_by: 0.2
  - if: surface == UNPAVED
    multiply_by: 0.3

speed:
  - if: true
    limit_to: 105  # 65 mph
  - if: road_class == RESIDENTIAL
    limit_to: 48   # 30 mph
