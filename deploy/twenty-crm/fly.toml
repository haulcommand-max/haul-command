# Twenty CRM — Fly.io Deployment
app = "hc-twenty-crm"
primary_region = "iad"

[build]
  image = "twentycrm/twenty:latest"

[env]
  NODE_ENV = "production"
  SERVER_URL = "https://hc-twenty-crm.fly.dev"
  FRONT_BASE_URL = "https://hc-twenty-crm.fly.dev"
  DISABLE_DB_MIGRATIONS = "false"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"
    path = "/healthz"

[mounts]
  source = "twenty_data"
  destination = "/app/.local-storage"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
