# Listmonk — Fly.io Deployment
app = "hc-listmonk"
primary_region = "iad"

[build]
  image = "listmonk/listmonk:latest"

[env]
  TZ = "America/New_York"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    path = "/api/health"

[mounts]
  source = "listmonk_uploads"
  destination = "/listmonk/uploads"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
