name: GSD Diff Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  gsd-diff-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin main --depth=1 || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Run GSD map on PR branch
        env:
          GSD_PROJECT_ID: ${{ secrets.GSD_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx tools/gsd/ast/run-map.ts

      - name: Run diff-aware analysis
        env:
          GSD_BASE_BRANCH: origin/main
          GSD_PROJECT_ID: ${{ secrets.GSD_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npx tsx tools/gsd/diff/run-diff-analysis.ts

      - name: Generate PR feedback
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GSD_PROJECT_ID: ${{ secrets.GSD_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx tools/gsd/pr/generate-pr-report.ts

      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gsd-diff-analysis
          path: |
            .planning/gsd-diff-report.json
            .planning/gsd-diff-report.md
            .planning/gsd-regression-queue.json
            .planning/gsd-pr-comment.md
            .planning/gsd-pr-report.json
            .planning/gsd-map-output.json
