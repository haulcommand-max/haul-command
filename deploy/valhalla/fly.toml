# ─────────────────────────────────────────────────────────────────
# Valhalla Routing Engine — Fly.io Deployment
# Self-hosted heavy-haul truck routing for Haul Command
#
# Deploy: flyctl launch --config deploy/valhalla/fly.toml
# Custom tiles: Place PBF extracts in /data/tiles/ before deploy
# ─────────────────────────────────────────────────────────────────

app = "hc-valhalla-routing"
primary_region = "iad"

[build]
  image = "ghcr.io/gis-ops/docker-valhalla/valhalla:latest"

[env]
  # Tile build on first launch (planet = full, or specify custom PBF)
  tile_urls = "https://download.geofabrik.de/north-america-latest.osm.pbf"
  # Serve config
  serve_tiles = "True"
  build_elevation = "False"
  build_admins = "True"
  build_time_zones = "True"
  # Use truck costing for heavy haul
  default_costing = "truck"
  # Force rebuild tiles on deploy (set False after first build)
  force_rebuild = "False"

# API port
[[services]]
  internal_port = 8002
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    path = "/status"

# Persistent volume for tile data (OSM extracts can be 5-30GB)
[mounts]
  source = "valhalla_tiles"
  destination = "/data/valhalla"

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
