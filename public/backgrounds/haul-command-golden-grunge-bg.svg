<svg xmlns="http://www.w3.org/2000/svg" width="819" height="2048" viewBox="0 0 819 2048" preserveAspectRatio="none">
  <defs>
    <linearGradient id="goldWash" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f2b71f"/>
      <stop offset="0.18" stop-color="#ffd45b"/>
      <stop offset="0.5" stop-color="#fff1a7"/>
      <stop offset="0.82" stop-color="#ffd45b"/>
      <stop offset="1" stop-color="#f0ae18"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="44%" r="68%">
      <stop offset="0" stop-color="#fff7c8" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#ffe47f" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#e8a612" stop-opacity="0"/>
    </radialGradient>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="5" seed="19" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0.18 0 0 0 0.82  0 0.15 0 0 0.60  0 0 0.08 0 0.03  0 0 0 0.25 0"/>
      <feBlend in="SourceGraphic" mode="soft-light"/>
    </filter>
    <pattern id="dotGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2.2" cy="2.2" r="1.65" fill="#fff"/>
    </pattern>
    <pattern id="fineDots" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="1.8" cy="1.8" r="1.05" fill="#fff"/>
    </pattern>
    <filter id="roughen">
      <feTurbulence baseFrequency="0.035" numOctaves="3" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <mask id="leftDistress">
      <rect width="819" height="2048" fill="black"/>
      <g fill="white" filter="url(#roughen)">
        <rect x="0" y="122" width="126" height="265" opacity="0.92"/>
        <rect x="0" y="660" width="154" height="330" opacity="0.88"/>
        <rect x="0" y="1220" width="132" height="230" opacity="0.82"/>
        <rect x="0" y="1640" width="152" height="355" opacity="0.92"/>
        <rect x="70" y="250" width="92" height="100" opacity="0.46"/>
        <rect x="92" y="730" width="96" height="145" opacity="0.42"/>
        <rect x="118" y="1560" width="96" height="120" opacity="0.38"/>
      </g>
    </mask>
    <mask id="rightDistress">
      <rect width="819" height="2048" fill="black"/>
      <g fill="white" filter="url(#roughen)">
        <rect x="678" y="104" width="141" height="282" opacity="0.9"/>
        <rect x="660" y="626" width="159" height="330" opacity="0.88"/>
        <rect x="675" y="1210" width="144" height="255" opacity="0.82"/>
        <rect x="654" y="1600" width="165" height="385" opacity="0.92"/>
        <rect x="610" y="214" width="92" height="120" opacity="0.42"/>
        <rect x="610" y="690" width="95" height="155" opacity="0.38"/>
        <rect x="596" y="1500" width="90" height="120" opacity="0.34"/>
      </g>
    </mask>
    <mask id="centerHalftone">
      <rect width="819" height="2048" fill="black"/>
      <g fill="white" opacity="0.55" filter="url(#roughen)">
        <rect x="270" y="112" width="120" height="118"/>
        <rect x="360" y="250" width="154" height="86"/>
        <rect x="205" y="452" width="120" height="150"/>
        <rect x="350" y="814" width="178" height="126"/>
        <rect x="300" y="1114" width="196" height="168"/>
        <rect x="240" y="1412" width="130" height="138"/>
        <rect x="390" y="1760" width="186" height="110"/>
      </g>
    </mask>
  </defs>
  <rect width="819" height="2048" fill="url(#goldWash)" filter="url(#paperNoise)"/>
  <rect width="819" height="2048" fill="url(#centerGlow)" opacity="0.88"/>
  <rect width="819" height="2048" fill="url(#dotGrid)" mask="url(#leftDistress)" opacity="0.78"/>
  <rect width="819" height="2048" fill="url(#dotGrid)" mask="url(#rightDistress)" opacity="0.8"/>
  <rect width="819" height="2048" fill="url(#fineDots)" mask="url(#centerHalftone)" opacity="0.34"/>
  <g opacity="0.18" filter="url(#roughen)">
    <rect x="0" y="0" width="32" height="2048" fill="#d88f00"/>
    <rect x="787" y="0" width="32" height="2048" fill="#d88f00"/>
    <rect x="148" y="0" width="2" height="2048" fill="#fff0a2"/>
    <rect x="668" y="0" width="2" height="2048" fill="#fff0a2"/>
  </g>
  <rect width="819" height="2048" fill="none" stroke="#f3b21a" stroke-opacity="0.24" stroke-width="14"/>
</svg>
