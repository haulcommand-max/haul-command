strongest_bonuses_and_upgrades:
  bonus_1_market_mode_governor:
    description: "Change page emphasis by market maturity."
    rules:
      - "empty market = claim + waitlist + sponsor + nearby utility"
      - "thin market = sponsor + claim + request coverage + nearby supply"
      - "active market = live-ish feed + booking + boosts + data teaser"
  bonus_2_claim_fomo_engine:
    description: "Show truthful, local claim pressure everywhere."
    placements:
      - "city pages"
      - "directory results"
      - "profile pages"
      - "role pages"
    messages:
      - "Claim this listing"
      - "Improve trust and visibility"
      - "Unlock report card and live features"
  bonus_3_corridor_data_teasers:
    description: "Every corridor page should tease paid market intelligence."
    teaser_types:
      - "supply density"
      - "demand heat"
      - "pricing movement"
      - "coverage gaps"
      - "hazard or restriction summaries"
  bonus_4_broker_side_capture:
    description: "Do not let supply pages exist without demand paths."
    required_surfaces:
      - "post a load"
      - "request urgent coverage"
      - "broker workflow CTA"
      - "quote request CTA"
  bonus_5_push_first_wiring:
    description: "High-intent pages should feed market-follow and corridor-follow triggers."
    triggers:
      - "follow city"
      - "follow corridor"
      - "save tool result"
      - "watch claim status"
      - "urgent load match opt-in"
  bonus_6_competitor_absorption:
    description: "Every strong competitor use case must have a page or block."
    must_exist:
      - "available now"
      - "repositioning/backhaul"
      - "forms hub"
      - "visible trust on results"
      - "instant request CTA"
      - "marketplace/vendor surfaces"
      - "self-serve sponsor buying"

do_not_ship_without:
  - "canonical-only routes defined"
  - "breadcrumbs visible"
  - "HTML crawlable links present"
  - "quick-answer block present on answer pages"
  - "freshness/confidence on regulation-like pages"
  - "claim CTA on claimable pages"
  - "commercial CTA on informational pages"
  - "related links block present"
  - "empty-state fallback present"
  - "analytics events mapped"
  - "sponsor decision made"
  - "trust strip present where applicable"

kill_list:
  - "orphan pages"
  - "JS-only core navigation"
  - "filler FAQ spam"
  - "thin local pages with no utility"
  - "fake trust or fake live activity"
  - "duplicate route variants"
  - "decorative hero sections with no next move"
  - "tool pages with no relation to service/regulation"
  - "regulation pages with no official source path"
  - "profile pages with no claim path"

medium_upgrade_trigger:
  move_from_small_to_medium_when:
    - "high-frequency corridor/city recompute jobs go live"
    - "market pulse and available-now publishing becomes regular"
    - "claim reminder / coverage gap / follow-market notifications scale"
    - "data teasers and sponsor inventory refresh on schedule"
    - "more write-heavy agent state tables are activated"
