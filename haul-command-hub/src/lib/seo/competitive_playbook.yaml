# ============================================================
# HAUL COMMAND — COMPETITIVE INTELLIGENCE PLAYBOOK
# What to steal from: Angi, YellowPages, Nextdoor, Tumblr, Reddit
# 50 high-utility adds — every one earns its keep
# ============================================================

competitive_playbook:
  version: "1.0"
  sources: [angi, yellowpages_thryv, nextdoor, tumblr, reddit_for_business]

# ============================================================
# ANGI PATTERNS
# ============================================================
angi_patterns:
  adgrid:
    - "3-slot Recommended Operators pack per city/corridor/search (organic + sponsored)"
    - "Free-to-start Pro onboarding + opportunities-last-month proof → upsell to paid visibility"
    - "Operator dashboard = money-in leads-out KPI panel (Leads, Calls, Quotes, Bookings)"
    - "Gold Operator / Corridor Elite awards with strict criteria + sponsored amplification"
    - "AdRank boosts from verified reviews + response speed"
  social:
    - "Content moat (guides, costs, FAQs) → funnel to Find Local Operators"
    - "CTA repetition everywhere (share + request quote + claim listing)"
    - "Local trust framing — local reviews as the product"

# ============================================================
# YELLOWPAGES / THRYV PATTERNS
# ============================================================
yellowpages_patterns:
  adgrid:
    - "Enhanced profile AS the ad unit (photos, details, promotions, social links, CTA)"
    - "Beyond-a-phone-call engagement menu (call, message, quote, booking, doc upload, route consult)"
    - "Premium placement tiers: City Top-3, Corridor Top-3, Port Sponsor, Near-Me Boost"
    - "Pay-per-qualified-call billing (duration threshold, fraud-filtered)"
  social:
    - "Per-profile OG preview + 1-tap share (SMS/WhatsApp/FB)"

# ============================================================
# NEXTDOOR PATTERNS
# ============================================================
nextdoor_patterns:
  adgrid:
    - "Brokers/drivers recommend operators as the core loop (quantified influence)"
    - "First-party targeting: corridor behavior + search + saved routes + quote events"
    - "Ads feel like helpful suggestions not banners"
    - "Creative guardrails: real imagery, no text-heavy, location-specific messaging"
    - "Frequency capping + fatigue analytics"
  social:
    - "Follow Operator / Follow Corridor with notifications"
    - "Public counters: follow count, repeat broker count, on-time streak"

# ============================================================
# TUMBLR PATTERNS
# ============================================================
tumblr_patterns:
  social:
    - "Per-page OG (image/title/desc/url) + canonical correctness"
    - "Structured share templates per entity type (operator/corridor/load)"
    - "Reblog Graph = Share Spread Map (where shares happened, which channel converted)"
  adgrid:
    - "Shares as first-class funnel: share → view → contact unlock/quote (fully attributable)"

# ============================================================
# REDDIT FOR BUSINESS PATTERNS
# ============================================================
reddit_patterns:
  adgrid:
    - "AdGrid AutoPilot (one toggle) — auto-optimize targeting, creative, placements, budget"
    - "Open-the-black-box reporting: best corridors, best time windows, who called, which keywords"
    - "Verified measurement + anti-IVT badge for enterprise advertiser trust"
    - "Spend-match credits: $1000 spend → $1000 credit (country-tuned)"
    - "Dashboard UX: customizable graphs, saved views, exports, recurring reports"
    - "One campaign → multiple placements (city + corridor + port + near-me)"
  social:
    - "Sponsorship inside load discussions, corridor alerts, permit tips (conversation placement)"

