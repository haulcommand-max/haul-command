commit_format: "feat|fix|refactor({cluster}): {what} [WAVE-{N}]"

# ─────────────────────────────────────────────────
# WAVE 1: MONEY PATH HARDENING (LAUNCH BLOCKER)
# ─────────────────────────────────────────────────
wave_1:
  name: "Money Path Hardening"
  priority: "LAUNCH_BLOCKER"
  dependencies: ["Stripe keys in env", "hc_escrows table exists"]
  do_not_touch: ["dispute-auto-resolve until GPS Proof Engine is live"]
  tasks:
    - id: "S1-01"
      action: "Implement idempotency_key generation in lib/stripe.ts"
      acceptance: "Every PaymentIntent.create call includes idempotency_key"
      commit: "feat(payments): enforce stripe idempotency keys [WAVE-1]"
    - id: "S1-02"
      action: "Add pre-auth hard-stop to POST /api/loads/create"
      acceptance: "Load with status DRAFT never appears on board. Only OPEN loads visible."
      commit: "feat(marketplace): block load visibility until escrow pre-auth [WAVE-1]"
    - id: "S1-03"
      action: "Wire hc_webhook_stripe to check gateway_reference_id before processing"
      acceptance: "Duplicate webhook payloads return 200 without side effects"
      commit: "fix(payments): deduplicate stripe webhook processing [WAVE-1]"
    - id: "S1-04"
      action: "Implement payout failure push path"
      acceptance: "Stripe transfer.failed triggers FCM push with deep link to /settings/payout-methods"
      commit: "feat(payments): wire payout failure push notifications [WAVE-1]"
    - id: "S1-05"
      action: "Add kyc_tier column and enforce at API level"
      acceptance: "Users below required tier get 403 on payment mutations"
      commit: "feat(auth): implement progressive kyc tier enforcement [WAVE-1]"

