reviews:
  - component: "SmartAutoLinker"
    review_type: "Regex Safety"
    comments:
      - "Issue: ReDoS vulnerability in glossary linker regex `/([A-Za-z]+[- ]?)+/g`"
      - "Fix: Anchor word boundaries `\\b` and limit lookaheads to max 3 terms. Use a strict dictionary match before regex evaluation to avoid pathological backtracking."
      - "Edge case skipped: Do not link text inside existing `<a>`, `<h1>`, or `<button>` tags."

  - component: "IndexNow Integration"
    review_type: "Formatting Edge Cases"
    comments:
      - "Issue: Payload URL formatting mismatch"
      - "Fix: Ensure all submitted URLs are absolute URLs matching the exact host requested (include https://). Submitting relative slugs will cause Bing/Yandex to silently drop the payload."
      - "Edge case skipped: Limit batch submission to 10,000 URLs per request to respect API constraints."

  - component: "Radar Map"
    review_type: "Fallbacks and Truth-first UI"
    comments:
      - "Issue: Infinite loading spinner on websocket failure"
      - "Fix: Fall back to HTTP polling if realtime channel connects but receives no heartbeat for 10s. Show 'Live updates paused' indicator to user instead of pretending the map is live."
      - "Edge case skipped: When a user denies Location access, center the map on the load's origin coordinates rather than null island (0,0)."

  - component: "Search Indexing & Corridor Generation"
    review_type: "Duplication Risks"
    comments:
      - "Issue: Directional duplication"
      - "Fix: Ensure 'Houston to Dallas' and 'Dallas to Houston' resolve to the same canonical representation OR ensure they have distinctly different H1 intents and localized data to prevent cannibalization."
      - "Edge case skipped: Missing hyphens in slugs (e.g., `new york` becoming `newyork` instead of `new-york`), breaking SEO patterns."

  - component: "Stripe Connect Onboarding"
    review_type: "Skipped Edge Cases"
    comments:
      - "Issue: Operator drops off mid-KYC"
      - "Fix: Must handle the `account.updated` webhook checking for `details_submitted = false` and trigger automated 'Complete your profile' nudges rather than leaving the account in limbo."
