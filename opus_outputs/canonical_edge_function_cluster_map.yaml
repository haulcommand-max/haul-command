# ═══════════════════════════════════════════════════════════════
# OPUS-01: CANONICAL EDGE FUNCTION CLUSTER MAP
# Decision Authority: Claude Opus 4.6
# Scope: All 108 discovered edge functions
# Rule: Upgrade-only. No deletion without proven replacement.
# ═══════════════════════════════════════════════════════════════

clusters:

  # ─────────────────────────────────────────────────
  # CLUSTER 1: PRESENCE & AVAILABILITY
  # Orchestrator: presence-and-availability-core
  # ─────────────────────────────────────────────────
  presence_cluster:
    orchestrator: "presence-and-availability-core"
    launch_tier: "DAY_ONE_CRITICAL"
    decision: "MERGE"
    rationale: "6 functions doing overlapping heartbeat/timeout logic. Merge into single stateful orchestrator."
    members:
      - name: "availability-ping"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Redundant with presence-heartbeat"
      - name: "availability-toggle"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Toggle is a write path on the same presence state"
      - name: "availability-truth-tick"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Truth reconciliation belongs inside the orchestrator cron"
      - name: "driver-presence-update"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Single-purpose write that the orchestrator handles"
      - name: "presence-heartbeat"
        action: "BECOMES_ORCHESTRATOR_CORE"
        reason: "Strongest implementation — absorbs others"
      - name: "presence-timeout-offline"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Timeout is the inverse path of heartbeat"

  # ─────────────────────────────────────────────────
  # CLUSTER 2: TRUST & RANKING
  # Orchestrator: trust-and-ranking-core
  # ─────────────────────────────────────────────────
  trust_cluster:
    orchestrator: "trust-and-ranking-core"
    launch_tier: "DAY_ONE_CRITICAL"
    decision: "MERGE"
    rationale: "7 functions computing overlapping score dimensions. Must converge into single trust spine."
    members:
      - name: "compute-trust-score"
        action: "BECOMES_ORCHESTRATOR_CORE"
        reason: "Primary trust computation — absorbs downstream recomputes"
      - name: "trust-event-ingest"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Event ingestion is the input pipeline to the same scorer"
      - name: "trust-score-recompute"
        action: "DEPRECATE"
        reason: "Redundant with compute-trust-score; proven duplicate"
      - name: "score-recompute"
        action: "DEPRECATE"
        reason: "Generic name, same logic as trust-score-recompute"
      - name: "fraud-score-recompute"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Fraud is a dimension of trust, not a separate system"
      - name: "rank-system-worker"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Ranking is the output layer of the trust computation"
      - name: "hc_quality_scoring_worker"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Quality scoring feeds the same trust composite"
      - name: "broker-score-recompute"
        action: "MERGE_INTO_ORCHESTRATOR"
        reason: "Broker trust is a role-scoped variant of the same engine"

