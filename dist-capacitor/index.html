<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#030712">
    <title>Haul Command</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #030712;
            color: #F9FAFB;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
            /* Safe area insets for notched devices */
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* Animated ambient glow */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
            animation: pulseGlow 2.5s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Logo container */
        .logo {
            position: relative;
            z-index: 1;
            width: 56px;
            height: 56px;
            margin-bottom: 1.25rem;
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        /* Brand name */
        .brand {
            position: relative;
            z-index: 1;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: #F59E0B;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        /* Loading bar */
        .loader-track {
            position: relative;
            z-index: 1;
            width: 140px;
            height: 3px;
            background: rgba(245,158,11,0.15);
            border-radius: 3px;
            overflow: hidden;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #F59E0B, transparent);
            border-radius: 3px;
            animation: slideLoader 1.4s ease-in-out infinite;
        }

        @keyframes slideLoader {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        /* Status text */
        .status {
            position: relative;
            z-index: 1;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: #6B7280;
            transition: opacity 0.3s ease;
        }

        /* Retry button (hidden by default) */
        .retry-btn {
            position: relative;
            z-index: 1;
            display: none;
            margin-top: 2rem;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: #030712;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 14px rgba(245,158,11,0.2);
        }

        .retry-btn:active {
            transform: scale(0.97);
        }

        /* Fade out when app loads */
        body.loaded {
            animation: fadeOut 0.3s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }
    </style>
</head>
<body>
    <div class="glow"></div>

    <!-- HC Logo Mark -->
    <div class="logo">
        <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="56" height="56" rx="14" fill="rgba(245,158,11,0.1)"/>
            <path d="M16 18v20M40 18v20M16 28h24" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M22 42h12" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>
    </div>

    <div class="brand">HAUL COMMAND</div>

    <div class="loader-track">
        <div class="loader-bar"></div>
    </div>

    <div class="status" id="statusText">Connecting&hellip;</div>

    <button class="retry-btn" id="retryBtn" onclick="location.reload()">
        Retry Connection
    </button>

    <script>
        var statusEl = document.getElementById('statusText');
        var retryBtn = document.getElementById('retryBtn');

        // Progress messages
        var messages = [
            { delay: 2000, text: 'Loading dispatch engine\u2026' },
            { delay: 5000, text: 'Establishing secure connection\u2026' },
            { delay: 10000, text: 'This is taking longer than expected\u2026' },
        ];

        messages.forEach(function(msg) {
            setTimeout(function() {
                if (statusEl) statusEl.textContent = msg.text;
            }, msg.delay);
        });

        // After 12 seconds, show retry button
        setTimeout(function() {
            if (statusEl) statusEl.textContent = 'Unable to reach HAUL COMMAND servers.';
            if (retryBtn) retryBtn.style.display = 'block';
        }, 12000);

        // When the Capacitor webview successfully loads the remote app,
        // this page gets replaced automatically. No additional JS needed.
    </script>
</body>
</html>
