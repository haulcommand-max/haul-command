# Project-wide Gradle settings.

# JVM args: 2GB heap + modern GC for faster builds
org.gradle.jvmargs=-Xmx2048m -XX:+UseParallelGC

# Parallel execution for multi-module builds (Capacitor + plugins)
org.gradle.parallel=true

# Build cache for faster incremental builds
org.gradle.caching=true

# AndroidX
android.useAndroidX=true

# Disable Jetifier (not needed with modern Capacitor 8.x)
android.enableJetifier=false

# Non-transitive R classes: smaller APK, faster builds
android.nonTransitiveRClass=true

# JDK 21 Toolchain — tell Gradle where to find it
org.gradle.java.installations.paths=C:\\Program Files\\Microsoft\\jdk-21.0.10.7-hotspot
org.gradle.java.installations.auto-download=true
org.gradle.java.installations.auto-detect=true
