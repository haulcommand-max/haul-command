# ─────────────────────────────────────────────────────────────────
# Typesense Search Engine — Fly.io Deployment
# Self-hosted real-time search for Haul Command
#
# Deploy: flyctl launch --config deploy/typesense/fly.toml
# ─────────────────────────────────────────────────────────────────

app = "hc-typesense"
primary_region = "iad"

[build]
  image = "typesense/typesense:29.0"

[env]
  TYPESENSE_DATA_DIR = "/data"
  TYPESENSE_ENABLE_CORS = "true"

[[services]]
  internal_port = 8108
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"

[mounts]
  source = "typesense_data"
  destination = "/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
